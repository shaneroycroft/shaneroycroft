<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact | shane roycroft</title>
    <meta name="description" content="Get in touch with Shane Roycroft — photography enquiries, collaborations, and general hello.">
    <meta property="og:title" content="contact | shane roycroft">
    <meta property="og:description" content="Get in touch with Shane Roycroft.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.shaneroycroft.com/contact.html">
    <meta property="og:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script>(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})()</script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="about.html">about</a>
            <a href="photography.html">photography</a>
            <a href="projects.html">projects</a>
            <a href="contact.html" class="active">contact</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="toggle theme" onclick="toggleTheme()">●</button>
        </div>
    </nav>

    <div class="container fade-in" style="max-width: 520px;">
        <h1 class="serif">say hello.</h1>
        <p class="text-secondary" style="margin-bottom: 2.5rem; line-height: 1.7;">photography enquiries, collaborations, or just a hello — i'd love to hear from you.</p>

        <form id="contact-form" action="https://formspree.io/f/meepkaln" method="POST" novalidate>
            <div class="form-group">
                <label class="form-label" for="name">name</label>
                <input class="form-input" type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">email</label>
                <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="message">message</label>
                <textarea class="form-input form-textarea" id="message" name="message" required rows="5"></textarea>
            </div>
            <button class="btn-submit" type="submit" id="submit-btn">send</button>
            <div id="form-feedback" class="form-feedback" style="display:none;"></div>
        </form>
    </div>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
        <a href="https://x.com/helloiamshane" target="_blank" rel="noopener" class="footer-x" aria-label="X / Twitter">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
    </footer>

    <script src="theme.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const btn  = document.getElementById('submit-btn');
        const fb   = document.getElementById('form-feedback');

        form.addEventListener('submit', async e => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'sending...';
            fb.style.display = 'none';

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (res.ok) {
                    form.reset();
                    fb.className = 'form-feedback form-feedback--success';
                    fb.textContent = 'message sent — i\'ll be in touch.';
                    btn.textContent = 'sent';
                } else {
                    throw new Error();
                }
            } catch {
                fb.className = 'form-feedback form-feedback--error';
                fb.textContent = 'something went wrong — try again or email directly.';
                btn.disabled = false;
                btn.textContent = 'send';
            }
            fb.style.display = 'block';
        });
    </script>
</body>
</html>
