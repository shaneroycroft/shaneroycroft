<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shane Roycroft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SHANE ROYCROFT</a>
        <div class="nav-links">
            <a href="index.html">about</a>
            <a href="photography.html">photography</a>
            <a href="projects.html">projects</a>
            <a href="contact.html" class="active">contact</a>
        </div>
    </nav>

    <div class="container fade-in" style="max-width: 600px;">
        <h2 style="font-size: 2rem; font-weight: 300; margin-bottom: 2rem;">Get in touch.</h2>
        
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" style="display: flex; flex-direction: column; gap: 2rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Name</label>
                <input type="text" name="name" required style="border: none; border-bottom: 1px solid var(--border); padding: 0.8rem 0; outline: none; font-family: inherit; font-size: 1rem;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Email</label>
                <input type="email" name="email" required style="border: none; border-bottom: 1px solid var(--border); padding: 0.8rem 0; outline: none; font-family: inherit; font-size: 1rem;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Message</label>
                <textarea name="message" rows="4" required style="border: none; border-bottom: 1px solid var(--border); padding: 0.8rem 0; outline: none; font-family: inherit; font-size: 1rem; resize: none;"></textarea>
            </div>

            <button type="submit" style="background: #1a1a1a; color: white; border: none; padding: 1.2rem; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.3s;">Send Message</button>
        </form>
    </div>

    <footer>&copy; 2026 Shane Roycroft</footer>
</body>
</html>
