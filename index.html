    <script src="theme.js"></script>
    <script>
        // Load featured photos: portfolio + pinned from other categories
        fetch('photos.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                const explicit = (data.portfolio || []);
                const seen = new Set(explicit.map(e => norm(e).src));
                const pinned = [];
                Object.entries(data).forEach(([cat, photos]) => {
                    if (cat === 'portfolio') return;
                    (photos || []).forEach(e => {
                        const p = norm(e);
                        if (e.pinned && !seen.has(p.src)) { seen.add(p.src); pinned.push(e); }
                    });
                });
                let photos;
                if (explicit.length) {
                    const anchor = explicit[Math.floor(Math.random() * explicit.length)];
                    const rest = shuffle(explicit.filter(e => norm(e).src !== norm(anchor).src).concat(pinned));
                    photos = [anchor, ...rest].slice(0, 3);
                } else {
                    photos = shuffle([...pinned]).slice(0, 3);
                }
                if (!photos.length) {
                    for (const cat of Object.values(data)) {
                        if (cat.length) { photos = shuffle([...cat]).slice(0, 3); break; }
                    }
                }
                if (photos.length) renderFeatured(photos);
            })
            .catch(() => {});

        function norm(e) {
            return typeof e === 'string' ? { src: e, caption: '' } : e;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function renderFeatured(photos) {
            const grid = document.getElementById('featured-grid');
            if (!grid) return;
            photos.forEach(p => {
                p = norm(p);
                const div = document.createElement('div');
                div.className = 'featured-item';
                const img = document.createElement('img');
                img.src = p.src;
                img.alt = p.caption || '';
                img.loading = 'lazy';
                img.onload = () => img.classList.add('loaded');
                if (img.complete) img.classList.add('loaded');
                div.appendChild(img);
                grid.appendChild(div);
            });
            grid.style.display = 'grid';
        }
    </script>
