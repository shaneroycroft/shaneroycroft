<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photography | shane roycroft</title>
    <meta name="description" content="Photography by Shane Roycroft — Japan, the desert, and more.">
    <meta property="og:title" content="photography | shane roycroft">
    <meta property="og:description" content="Photography by Shane Roycroft.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.shaneroycroft.com/photography.html">
    <meta property="og:image" content="https://www.shaneroycroft.com/og.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.shaneroycroft.com/og.jpg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="index.html">about</a>
            <a href="photography.html" class="active">photography</a>
            <a href="projects.html">projects</a>
            <a href="contact.html">contact</a>
        </div>
        <div class="sub-nav" id="sub-nav"></div>
    </nav>

    <div class="container fade-in">
        <div class="gallery" id="photo-grid"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" alt="">
        <p id="lightbox-caption"></p>
        <button id="lightbox-prev" onclick="event.stopPropagation(); shiftLightbox(-1)">&#8592;</button>
        <button id="lightbox-next" onclick="event.stopPropagation(); shiftLightbox(1)">&#8594;</button>
    </div>

    <script>
        const PHOTOS_URL = 'photos.json?t=' + Date.now();
        let categories = { 'japan': [], 'the desert': [], 'more': [] };
        let currentList = []; // always normalised to {src, caption} objects
        let currentIndex = 0;

        // Normalise a manifest entry — may be a plain string or {src, caption}
        function norm(entry) {
            return typeof entry === 'string' ? { src: entry, caption: '' } : entry;
        }

        fetch(PHOTOS_URL)
            .then(r => r.json())
            .then(data => { categories = data; initPage(); })
            .catch(() => initPage());

        function buildSubNav(activecat) {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = '';
            Object.keys(categories).forEach(cat => {
                const span = document.createElement('span');
                span.textContent = cat;
                if (cat === activecat) span.classList.add('active');
                span.onclick = () => setCategory(cat);
                nav.appendChild(span);
            });
        }

        function initPage() {
            const hash = window.location.hash.replace('#', '').replace(/-/g, ' ');
            const first = Object.keys(categories)[0] || 'japan';
            render(categories[hash] !== undefined ? hash : first);
        }

        function setCategory(cat) {
            window.location.hash = cat.replace(/\s+/g, '-');
            render(cat);
        }

        function render(cat) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';

            buildSubNav(cat);

            const raw = categories[cat] || [];
            currentList = raw.map(norm);

            if (currentList.length === 0) {
                grid.innerHTML = '<p class="text-muted" style="padding-top:2rem;">no photos yet.</p>';
                return;
            }

            currentList.forEach((item, i) => createItem(item, i, grid));
        }

        function createItem(item, index, container) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            const img = document.createElement('img');
            img.src = item.src;
            img.loading = 'lazy';
            img.alt = item.caption || '';
            img.onload = () => img.classList.add('loaded');
            img.onclick = () => openLightbox(index);
            // If cached, onload may have already fired
            if (img.complete) img.classList.add('loaded');
            div.appendChild(img);
            if (item.caption) {
                const cap = document.createElement('div');
                cap.className = 'gallery-caption';
                cap.textContent = item.caption;
                div.appendChild(cap);
            }
            container.appendChild(div);
        }

        function openLightbox(index) {
            currentIndex = index;
            const item = currentList[index];
            document.getElementById('lightbox-img').src = item.src;
            const cap = document.getElementById('lightbox-caption');
            cap.textContent = item.caption || '';
            cap.style.display = item.caption ? 'block' : 'none';
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-prev').style.display = currentList.length > 1 ? 'block' : 'none';
            document.getElementById('lightbox-next').style.display = currentList.length > 1 ? 'block' : 'none';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function shiftLightbox(dir) {
            currentIndex = (currentIndex + dir + currentList.length) % currentList.length;
            const item = currentList[currentIndex];
            document.getElementById('lightbox-img').src = item.src;
            const cap = document.getElementById('lightbox-caption');
            cap.textContent = item.caption || '';
            cap.style.display = item.caption ? 'block' : 'none';
        }

        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if (lb.style.display !== 'flex') return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') shiftLightbox(-1);
            if (e.key === 'ArrowRight') shiftLightbox(1);
        });

        // Swipe support
        let swipeX = 0;
        const lb = document.getElementById('lightbox');
        lb.addEventListener('touchstart', e => { swipeX = e.changedTouches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - swipeX;
            if (Math.abs(dx) > 48) shiftLightbox(dx < 0 ? 1 : -1);
        });
    </script>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
        <a href="https://x.com/helloiamshane" target="_blank" rel="noopener" class="footer-x" aria-label="X / Twitter">

        </a>
    </footer>
</body>
</html>
