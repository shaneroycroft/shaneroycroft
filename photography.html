<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photography | shane roycroft</title>
    <meta name="description" content="Photography by Shane Roycroft — portfolio, Japan, the desert.">
    <meta property="og:title" content="photography | shane roycroft">
    <meta property="og:description" content="Photography by Shane Roycroft.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.shaneroycroft.com/photography.html">
    <meta property="og:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script>(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})()</script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="about.html">about</a>
            <a href="photography.html" class="active">photography</a>
            <a href="projects.html">projects</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="toggle theme" onclick="toggleTheme()">●</button>
        </div>
        <div class="sub-nav" id="sub-nav"></div>
    </nav>

    <div class="container fade-in">
        <h1 class="sr-only">photography</h1>
        <div class="photo-sections" id="photo-sections"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" alt="">
        <p id="lightbox-caption"></p>
        <button id="lightbox-prev" onclick="event.stopPropagation(); shiftLightbox(-1)">&#8592;</button>
        <button id="lightbox-next" onclick="event.stopPropagation(); shiftLightbox(1)">&#8594;</button>
    </div>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
        <a href="editor.html" class="footer-editor-link">edit your photos →</a>
        <a href="https://x.com/helloiamshane" target="_blank" rel="noopener" class="footer-x" aria-label="X / Twitter">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
    </footer>

    <script src="theme.js"></script>
    <script>
        const PHOTOS_URL = 'photos.json?t=' + Date.now();
        let categories = {};
        let currentList = [];
        let currentIndex = 0;

        function norm(entry) {
            return typeof entry === 'string' ? { src: entry, caption: '' } : entry;
        }

        fetch(PHOTOS_URL)
            .then(r => r.json())
            .then(data => { categories = data; initPage(); })
            .catch(() => initPage());

        function initPage() {
            const keys = Object.keys(categories);

            // Show portfolio always + any category with photos
            const visible = keys.filter(k =>
                k === 'portfolio' || (categories[k] || []).length > 0
            );

            if (visible.length === 0) {
                document.getElementById('photo-sections').innerHTML =
                    '<p class="text-muted" style="padding-top:2rem;">no photos yet.</p>';
                return;
            }

            buildSubNav(visible);
            buildSections(visible);
            setupScrollHighlight(visible);

            // Scroll to hash on load
            const hash = window.location.hash.replace('#', '').replace(/-/g, ' ');
            if (hash && categories[hash] !== undefined) {
                setTimeout(() => scrollToSection(hash), 80);
            }
        }

        function buildSubNav(sections) {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = '';
            sections.forEach(cat => {
                const span = document.createElement('span');
                span.textContent = cat;
                span.id = 'subnav-' + slugify(cat);
                span.onclick = () => scrollToSection(cat);
                nav.appendChild(span);
            });
        }

        // Portfolio = explicit portfolio entries + pinned photos from other categories
        function getPortfolioPhotos() {
            const explicit = (categories['portfolio'] || []).map(norm);
            const seen = new Set(explicit.map(p => p.src));
            Object.entries(categories).forEach(([cat, photos]) => {
                if (cat === 'portfolio') return;
                (photos || []).forEach(entry => {
                    const p = norm(entry);
                    if (entry.pinned && !seen.has(p.src)) { seen.add(p.src); explicit.push(p); }
                });
            });
            return explicit;
        }

        function buildSections(sections) {
            const container = document.getElementById('photo-sections');
            sections.forEach(cat => {
                const section = document.createElement('section');
                section.className = 'photo-section';
                section.id = 'section-' + slugify(cat);
                section.dataset.cat = cat;

                const label = document.createElement('h2');
                label.className = 'photo-section-label serif';
                label.textContent = cat;
                section.appendChild(label);

                const grid = document.createElement('div');
                grid.className = 'gallery';

                const photos = cat === 'portfolio' ? getPortfolioPhotos() : (categories[cat] || []).map(norm);

                if (photos.length === 0) {
                    const empty = document.createElement('p');
                    empty.className = 'text-muted';
                    empty.style.paddingTop = '0.5rem';
                    empty.textContent = 'no photos yet.';
                    grid.appendChild(empty);
                } else {
                    photos.forEach((item, i) => createItem(item, i, grid, cat));
                }

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function createItem(item, index, container, cat) {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = item.src;
            img.loading = 'lazy';
            img.alt = item.caption || '';
            img.onload = () => img.classList.add('loaded');
            if (img.complete) img.classList.add('loaded');
            img.onclick = () => {
                currentList = cat === 'portfolio' ? getPortfolioPhotos() : (categories[cat] || []).map(norm);
                openLightbox(index);
            };

            div.appendChild(img);

            if (item.caption) {
                const cap = document.createElement('div');
                cap.className = 'gallery-caption';
                cap.textContent = item.caption;
                div.appendChild(cap);
            }

            container.appendChild(div);
        }

        function scrollToSection(cat) {
            window.location.hash = slugify(cat);
            const section = document.getElementById('section-' + slugify(cat));
            if (section) {
                const navH = document.querySelector('nav').offsetHeight;
                const top = section.getBoundingClientRect().top + window.scrollY - navH - 24;
                window.scrollTo({ top, behavior: 'smooth' });
            }
        }

        function setupScrollHighlight(sections) {
            const navH = document.querySelector('nav').offsetHeight;
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const cat = entry.target.dataset.cat;
                    const span = document.getElementById('subnav-' + slugify(cat));
                    if (span) span.classList.toggle('active', entry.isIntersecting);
                });
            }, { rootMargin: `-${navH + 8}px 0px -55% 0px` });

            sections.forEach(cat => {
                const el = document.getElementById('section-' + slugify(cat));
                if (el) observer.observe(el);
            });
        }

        function slugify(str) { return str.replace(/\s+/g, '-'); }

        // ── Lightbox ──────────────────────────────────────
        function openLightbox(index) {
            currentIndex = index;
            const item = currentList[index];
            document.getElementById('lightbox-img').src = item.src;
            const cap = document.getElementById('lightbox-caption');
            cap.textContent = item.caption || '';
            cap.style.display = item.caption ? 'block' : 'none';
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-prev').style.display = currentList.length > 1 ? 'block' : 'none';
            document.getElementById('lightbox-next').style.display = currentList.length > 1 ? 'block' : 'none';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function shiftLightbox(dir) {
            currentIndex = (currentIndex + dir + currentList.length) % currentList.length;
            const item = currentList[currentIndex];
            document.getElementById('lightbox-img').src = item.src;
            const cap = document.getElementById('lightbox-caption');
            cap.textContent = item.caption || '';
            cap.style.display = item.caption ? 'block' : 'none';
        }

        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if (lb.style.display !== 'flex') return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') shiftLightbox(-1);
            if (e.key === 'ArrowRight') shiftLightbox(1);
        });

        // Swipe support
        let swipeX = 0;
        const lb = document.getElementById('lightbox');
        lb.addEventListener('touchstart', e => { swipeX = e.changedTouches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - swipeX;
            if (Math.abs(dx) > 48) shiftLightbox(dx < 0 ? 1 : -1);
        });
    </script>
</body>
</html>
