<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photography | shane roycroft</title>
    <meta name="description" content="Photography by Shane Roycroft — portfolio, Japan, the desert.">
    <meta property="og:title" content="photography | shane roycroft">
    <meta property="og:description" content="Photography by Shane Roycroft.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.shaneroycroft.com/photography.html">
    <meta property="og:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script>(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})()</script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="about.html">about</a>
            <a href="photography.html" class="active">photography</a>
            <a href="projects.html">projects</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="toggle theme" onclick="toggleTheme()">●</button>
        </div>
        <div class="sub-nav" id="sub-nav"></div>
    </nav>

    <div class="container fade-in">
        <h1 class="sr-only">photography</h1>
        <div class="photo-sections" id="photo-sections"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" alt="">
        <div id="lightbox-meta">
            <span id="lightbox-caption"></span>
            <span id="lightbox-exif"></span>
        </div>
        <button id="lightbox-prev" onclick="event.stopPropagation(); shiftLightbox(-1)">&#8592;</button>
        <button id="lightbox-next" onclick="event.stopPropagation(); shiftLightbox(1)">&#8594;</button>
    </div>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
    <script src="lazyload.js"></script>
    <script src="reveal.js"></script>
    <script src="theme.js"></script>
    <script>
        const PHOTOS_URL = 'photos.json?t=' + Date.now();
        let categories = {};
        let currentList = [];
        let currentIndex = 0;

        function norm(entry) {
            return typeof entry === 'string' ? { src: entry, caption: '' } : entry;
        }
        function visible(entry) { return !(typeof entry === 'object' && entry.hidden); }

        fetch(PHOTOS_URL)
            .then(r => r.json())
            .then(data => { categories = data; initPage(); })
            .catch(() => initPage());

        let activeCat = 'portfolio';

        function initPage() {
            const keys = Object.keys(categories);
            const hiddenCats = categories._hidden || [];

            // Show portfolio always + any non-hidden category with photos
            const visible = keys.filter(k =>
                !k.startsWith('_') &&
                !hiddenCats.includes(k) &&
                (k === 'portfolio' || (categories[k] || []).length > 0)
            );

            if (visible.length === 0) {
                document.getElementById('photo-sections').innerHTML =
                    '<p class="text-muted" style="padding-top:2rem;">no photos yet.</p>';
                return;
            }

            buildSubNav(visible);
            buildSections(visible);

            // Switch to hash category on load, else default to first (portfolio)
            const hash = window.location.hash.replace('#', '').replace(/-/g, ' ');
            const initial = (hash && visible.includes(hash)) ? hash : visible[0];
            switchTo(initial);
        }

        function buildSubNav(sections) {
            const nav = document.getElementById('sub-nav');
            nav.innerHTML = '';
            sections.forEach(cat => {
                const span = document.createElement('span');
                span.textContent = cat;
                span.id = 'subnav-' + slugify(cat);
                span.onclick = () => switchTo(cat);
                nav.appendChild(span);
            });
        }

        function switchTo(cat) {
            activeCat = cat;
            document.querySelectorAll('.photo-section').forEach(s => {
                s.style.display = s.dataset.cat === cat ? '' : 'none';
            });
            document.querySelectorAll('#sub-nav span').forEach(s => {
                s.classList.toggle('active', s.id === 'subnav-' + slugify(cat));
            });
            window.location.hash = slugify(cat);
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // Portfolio = explicit portfolio entries + pinned photos from other categories
        function getPortfolioPhotos() {
            const explicit = (categories['portfolio'] || []).filter(visible).map(norm);
            const seen = new Set(explicit.map(p => p.src));
            Object.entries(categories).forEach(([cat, photos]) => {
                if (cat === 'portfolio') return;
                (photos || []).forEach(entry => {
                    const p = norm(entry);
                    if (entry.pinned && visible(entry) && !seen.has(p.src)) { seen.add(p.src); explicit.push(p); }
                });
            });
            return explicit;
        }

        function buildSections(sections) {
            const container = document.getElementById('photo-sections');
            sections.forEach(cat => {
                const section = document.createElement('section');
                section.className = 'photo-section reveal';
                section.id = 'section-' + slugify(cat);
                section.dataset.cat = cat;

                const grid = document.createElement('div');
                grid.className = 'gallery';

                const photos = cat === 'portfolio' ? getPortfolioPhotos() : (categories[cat] || []).filter(visible).map(norm);

                if (photos.length === 0) {
                    const empty = document.createElement('p');
                    empty.className = 'text-muted';
                    empty.style.paddingTop = '0.5rem';
                    empty.textContent = 'no photos yet.';
                    grid.appendChild(empty);
                } else {
                    photos.forEach((item, i) => createItem(item, i, grid, cat));
                }

                section.appendChild(grid);
                container.appendChild(section);
                if (window.revealObserve) window.revealObserve(section);
            });
        }

        function createItem(item, index, container, cat) {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            const img = document.createElement('img');
            img.dataset.src = item.src;
            img.alt = item.caption || '';
            img.onload = () => img.classList.add('loaded');
            window.lazyLoad(img);
            img.onclick = () => {
                currentList = cat === 'portfolio' ? getPortfolioPhotos() : (categories[cat] || []).map(norm);
                openLightbox(index);
            };

            div.appendChild(img);

            if (item.caption) {
                const cap = document.createElement('div');
                cap.className = 'gallery-caption';
                cap.textContent = item.caption;
                div.appendChild(cap);
            }

            container.appendChild(div);
        }

        function slugify(str) { return str.replace(/\s+/g, '-'); }

        // ── Lightbox ──────────────────────────────────────
        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-prev').style.display = currentList.length > 1 ? 'block' : 'none';
            document.getElementById('lightbox-next').style.display = currentList.length > 1 ? 'block' : 'none';
            setLightboxPhoto(currentList[index]);
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox').style.backgroundColor = '';
        }

        function shiftLightbox(dir) {
            currentIndex = (currentIndex + dir + currentList.length) % currentList.length;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.style.opacity = '0';
            setTimeout(() => setLightboxPhoto(currentList[currentIndex]), 180);
        }

        function setLightboxPhoto(item) {
            const lbImg = document.getElementById('lightbox-img');
            const cap   = document.getElementById('lightbox-caption');
            const exifEl = document.getElementById('lightbox-exif');
            cap.textContent  = item.caption || '';
            exifEl.textContent = '';
            lbImg.src = item.src;
            lbImg.style.opacity = '0';
            lbImg.onload = () => {
                lbImg.style.opacity = '1';
                applyAmbientColor(lbImg);
                loadLightboxExif(item.src, exifEl);
            };
            if (lbImg.complete && lbImg.naturalWidth) {
                lbImg.style.opacity = '1';
                applyAmbientColor(lbImg);
                loadLightboxExif(item.src, exifEl);
            }
        }

        function applyAmbientColor(img) {
            try {
                const cv = document.createElement('canvas');
                cv.width = cv.height = 64;
                cv.getContext('2d').drawImage(img, 0, 0, 64, 64);
                const d = cv.getContext('2d').getImageData(0, 0, 64, 64).data;
                let r=0, g=0, b=0, n=0;
                for (let i=0; i<d.length; i+=4) {
                    const ri=d[i], gi=d[i+1], bi=d[i+2];
                    const mx=Math.max(ri,gi,bi), mn=Math.min(ri,gi,bi);
                    if (mx && (mx-mn)/mx > 0.12) { r+=ri; g+=gi; b+=bi; n++; }
                }
                if (!n) { for (let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; } }
                const sc = 0.18; // darken significantly — we want a mood, not a colour explosion
                document.getElementById('lightbox').style.backgroundColor =
                    `rgba(${r/n*sc|0},${g/n*sc|0},${b/n*sc|0},0.98)`;
            } catch(e) {}
        }

        function loadLightboxExif(src, el) {
            if (typeof exifr === 'undefined') return;
            exifr.parse(src, { tiff:true, exif:true, gps:false, translateValues:true, reviveValues:true })
                .then(x => {
                    if (!x) return;
                    const parts = [];
                    const model = x.Model ? x.Model.trim() : '';
                    const make  = x.Make  ? x.Make.trim()  : '';
                    const cam = (make && !model.toLowerCase().startsWith(make.toLowerCase())) ? make+' '+model : model;
                    if (cam) parts.push(cam);
                    if (x.FocalLength) parts.push(x.FocalLength + 'mm');
                    if (x.FNumber)     parts.push('f/' + x.FNumber.toFixed(1));
                    if (x.ExposureTime) parts.push(x.ExposureTime >= 1 ? x.ExposureTime+'s' : '¹⁄'+Math.round(1/x.ExposureTime)+'s');
                    if (x.ISO)         parts.push('iso ' + x.ISO);
                    el.textContent = parts.join('  ·  ');
                }).catch(() => {});
        }

        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if (lb.style.display !== 'flex') return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') shiftLightbox(-1);
            if (e.key === 'ArrowRight') shiftLightbox(1);
        });

        // Swipe support
        let swipeX = 0;
        const lb = document.getElementById('lightbox');
        lb.addEventListener('touchstart', e => { swipeX = e.changedTouches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - swipeX;
            if (Math.abs(dx) > 48) shiftLightbox(dx < 0 ? 1 : -1);
        });
    </script>
</body>
</html>
