<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photography | shane roycroft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="index.html">about</a>
            <a href="photography.html" class="active">photography</a>
            <a href="projects.html">projects</a>
            <a href="contact.html">contact</a>
        </div>
        <div class="sub-nav">
            <span id="tab-japan" onclick="setCategory('japan')">japan</span>
            <span id="tab-desert" onclick="setCategory('the desert')">the desert</span>
            <span id="tab-more" onclick="setCategory('more')">more</span>
        </div>
    </nav>

    <div class="container fade-in">
        <div class="gallery" id="photo-grid"></div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>

    <script>
        const categories = {
            'japan': [],
            'the desert': [],
            'more': []
        };

        function setCategory(cat) {
            window.location.hash = cat.replace(/\s+/g, '-');
            render(cat);
        }

        function render(cat) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';

            document.querySelectorAll('.sub-nav span').forEach(s => s.classList.remove('active'));
            const safeId = 'tab-' + (cat === 'the desert' ? 'desert' : cat);
            if(document.getElementById(safeId)) document.getElementById(safeId).classList.add('active');

            const list = categories[cat] || [];

            if(list.length === 0) {
                // Generates 6 high-quality sample photos for testing
                for(let i=1; i<=6; i++) {
                    const src = `https://picsum.photos/seed/${cat+i}/800/${i % 2 === 0 ? 1100 : 700}`;
                    createItem(src, grid);
                }
            } else {
                list.forEach(src => createItem(src, grid));
            }
        }

        function createItem(src, container) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `<img src="${src}" loading="lazy" onclick="openLightbox('${src}')">`;
            container.appendChild(div);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        window.onload = () => {
            const hash = window.location.hash.replace('#', '').replace('-', ' ');
            render(categories[hash] ? hash : 'japan');
        };
    </script>
</body>
</html>
