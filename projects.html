<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projects | shane roycroft</title>
    <meta name="description" content="Projects by Shane Roycroft — software, blockchain, and more.">
    <meta property="og:title" content="projects | shane roycroft">
    <meta property="og:description" content="Software and blockchain projects by Shane Roycroft.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.shaneroycroft.com/projects.html">
    <meta property="og:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/shaneroycroft/shaneroycroft/main/images/portfolio/1774448225228_dscf4528.jpeg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script>(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}})()</script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="about.html">about</a>
            <a href="photography.html">photography</a>
            <a href="projects.html" class="active">projects</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="toggle theme" onclick="toggleTheme()">●</button>
        </div>
    </nav>

    <div class="container fade-in">
        <h1 class="serif">work.</h1>
        <div class="project-list" id="project-list"></div>
    </div>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
        <a href="https://x.com/helloiamshane" target="_blank" rel="noopener" class="footer-x" aria-label="X / Twitter">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
    </footer>

    <script src="theme.js"></script>
    <script>
        fetch('projects.json?t=' + Date.now())
            .then(r => r.json())
            .then(renderProjects)
            .catch(() => {});

        function renderProjects(projects) {
            const list = document.getElementById('project-list');
            if (!list || !projects.length) return;
            projects.forEach(proj => {
                const card = document.createElement('div');
                card.className = 'project-card';
                const badgeClass = proj.status === 'live' ? 'project-badge project-badge--live' : 'project-badge';
                const linksHtml = (proj.links || []).map(l =>
                    `<a href="${l.url}" target="_blank" rel="noopener" class="project-link">${l.label}</a>`
                ).join('');
                const techHtml = proj.tech
                    ? `<p class="text-secondary" style="font-size:0.78rem; margin-top:0.75rem; letter-spacing:0.03em;">${proj.tech}</p>`
                    : '';
                card.innerHTML = `
                    <div class="project-year">${proj.year || ''}</div>
                    <div class="project-info">
                        <h3>${proj.title}</h3>
                        <p>${proj.description}</p>
                        ${techHtml}
                        <div class="project-links">
                            ${linksHtml}
                            <span class="${badgeClass}">${proj.status}</span>
                        </div>
                    </div>`;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
