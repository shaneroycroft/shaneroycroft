<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin | shane roycroft</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Admin tabs ─────────────────────────────────── */
        .admin-tabs {
            display: flex; gap: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .admin-tab {
            font-size: 0.8rem; text-transform: lowercase; letter-spacing: 1px;
            color: var(--secondary); cursor: pointer; padding-bottom: 0.75rem;
            border-bottom: 1px solid transparent; margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .admin-tab.active { color: var(--text); border-bottom-color: var(--text); }
        .admin-tab:hover:not(.active) { color: var(--text); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── PAT strip ──────────────────────────────────── */
        .pat-strip {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.75rem 0; border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem; font-size: 0.75rem;
        }
        .pat-strip-status { flex: 1; color: var(--secondary); }
        .pat-strip-status.ok { color: #27ae60; }
        .pat-strip-status.err { color: #c0392b; }
        .pat-edit-toggle {
            background: none; border: none; cursor: pointer; font-family: inherit;
            font-size: 0.75rem; color: var(--secondary); letter-spacing: 0.5px;
            text-decoration: underline; padding: 0;
        }
        .pat-form {
            display: none; align-items: flex-end; gap: 0.75rem;
            padding: 1rem 0 1.5rem; border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .pat-form.visible { display: flex; }
        .pat-form .form-field { flex: 1; margin: 0; }
        .pat-hint { font-size: 0.72rem; color: var(--secondary); margin-top: 0.4rem; }

        /* ── shared section label ────────────────────────── */
        .admin-section { margin-bottom: 3rem; }

        /* Category row — tabs + + new, no label */
        .cat-row {
            display: flex; align-items: center; gap: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .category-tabs { display: flex; gap: 1.25rem; flex-wrap: wrap; flex: 1; }
        .category-tabs span { font-size: 0.8rem; text-transform: lowercase; letter-spacing: 1px; cursor: pointer; color: var(--secondary); padding-bottom: 2px; transition: 0.2s; }
        .category-tabs span.active { color: var(--text); border-bottom: 1px solid var(--text); }
        .cat-new-btn {
            background: none; border: none; cursor: pointer; font-family: inherit;
            font-size: 0.8rem; text-transform: lowercase; letter-spacing: 1px;
            color: var(--secondary); padding: 0 0 2px; transition: color 0.2s;
            flex-shrink: 0; white-space: nowrap;
        }
        .cat-new-btn:hover { color: var(--text); }
        .drop-zone {
            border: 1px dashed var(--border);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 1.5rem;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--text); }
        .drop-zone p { font-size: 0.85rem; color: var(--secondary); }
        .drop-zone input { display: none; }
        .preview-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .preview-item { position: relative; display: flex; gap: 1rem; align-items: center; }
        .preview-item img { width: 72px; height: 72px; object-fit: cover; display: block; flex-shrink: 0; }
        .preview-meta { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        .preview-caption {
            width: 100%; font-family: inherit; font-size: 0.8rem;
            border: 1px solid var(--border); padding: 0.4rem 0.6rem;
            background: var(--bg); color: var(--text); outline: none;
        }
        .preview-caption:focus { border-color: var(--text); }
        .preview-size { font-size: 0.7rem; color: var(--secondary); }
        .preview-remove {
            align-self: flex-start; background: none; border: none; cursor: pointer;
            font-size: 0.7rem; color: var(--secondary); font-family: inherit;
            letter-spacing: 0.5px; padding: 0; transition: color 0.2s;
        }
        .preview-remove:hover { color: #c0392b; }
        .preview-item .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: var(--text); width: 0%; transition: width 0.3s;
        }
        .preview-item .status-icon {
            position: absolute; top: 4px; left: 4px;
            background: rgba(255,255,255,0.9); font-size: 0.7rem; padding: 2px 5px;
        }
        .existing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; }
        .existing-item { position: relative; }
        .existing-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; filter: grayscale(100%); transition: 0.4s; }
        .existing-item:hover img { filter: grayscale(0%); }
        .existing-item .item-actions {
            position: absolute; top: 4px; right: 4px;
            display: none; flex-direction: column; gap: 3px;
        }
        .existing-item:hover .item-actions { display: flex; }
        .existing-item .item-actions button {
            background: rgba(255,255,255,0.95); border: none; cursor: pointer;
            font-size: 0.7rem; padding: 3px 7px; color: var(--text); line-height: 1.5;
        }
        .existing-item .item-actions .btn-delete { color: #c0392b; }
        .existing-item .pin-dot {
            position: absolute; top: 4px; left: 4px;
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text); display: none;
        }
        .existing-item.pinned .pin-dot { display: block; }
        .log { font-size: 0.75rem; color: var(--secondary); line-height: 1.8; min-height: 2rem; }
        .log .err { color: #c0392b; }
        .log .ok { color: #27ae60; }
        .btn-sm {
            background: var(--text); color: var(--bg); border: none;
            padding: 0.7rem 1.5rem; cursor: pointer; font-family: inherit;
            font-size: 0.75rem; text-transform: lowercase; letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        .btn-sm:hover { opacity: 0.7; }
        .btn-sm:disabled { opacity: 0.3; cursor: default; }
        .btn-ghost {
            background: none; color: var(--text); border: 1px solid var(--border);
            padding: 0.7rem 1.5rem; cursor: pointer; font-family: inherit;
            font-size: 0.75rem; text-transform: lowercase; letter-spacing: 1px;
            transition: border-color 0.3s;
        }
        .btn-ghost:hover { border-color: var(--text); }



        /* ── New category inline form ────────────────────── */
        .cat-new-form {
            display: none; align-items: center; gap: 0.5rem; margin-bottom: 1.75rem;
        }
        .cat-new-form.visible { display: flex; }
        .cat-new-input {
            font-family: inherit; font-size: 0.8rem; background: var(--bg);
            color: var(--text); border: 1px solid var(--border); padding: 0.3rem 0.6rem;
            outline: none; width: 160px;
        }
        .cat-new-input:focus { border-color: var(--text); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">shane roycroft</a>
        <div class="nav-links">
            <a href="index.html">about</a>
            <a href="photography.html">photography</a>
            <a href="projects.html">projects</a>
            <a href="contact.html">contact</a>
        </div>
    </nav>

    <div class="container fade-in" style="max-width: 800px;">
        <h2 class="serif" style="margin-bottom: 2rem;">photo admin.</h2>

        <!-- PAT strip (always visible, compact) -->
        <div class="pat-strip" id="pat-strip">
            <span class="pat-strip-status" id="pat-strip-status">no token saved</span>
            <button class="pat-edit-toggle" onclick="togglePatForm()">configure</button>
        </div>
        <div class="pat-form" id="pat-form">
            <div class="form-field">
                <label for="pat-input">personal access token</label>
                <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
                <p class="pat-hint">stored in localStorage only — needs <code>Contents: Read &amp; Write</code> on shaneroycroft/shaneroycroft.</p>
            </div>
            <button class="btn-sm" onclick="savePAT()">save</button>
            <button class="btn-ghost" onclick="clearPAT()">clear</button>
        </div>

        <!-- Tab bar — hidden until PAT verified -->
        <div class="admin-tabs" id="admin-tabs" style="display:none;">
            <span class="admin-tab active" onclick="switchTab('upload')">upload</span>
            <span class="admin-tab" onclick="switchTab('manage')">manage</span>
        </div>

        <!-- Upload tab -->
        <div class="tab-panel active" id="tab-upload">
            <div class="admin-section">
                <div class="cat-row">
                    <div class="category-tabs" id="upload-tabs"></div>
                    <button class="cat-new-btn" onclick="showCatForm('upload')">+ new</button>
                </div>
                <div class="cat-new-form" id="upload-new-form">
                    <input class="cat-new-input" id="upload-new-input" placeholder="category name" maxlength="40">
                    <button class="btn-sm" onclick="createCategory('upload')">create</button>
                    <button class="btn-ghost" onclick="hideCatForm('upload')">cancel</button>
                </div>
                <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <p>drop images here or click to browse</p>
                    <input type="file" id="file-input" multiple accept="image/*">
                </div>
                <div class="preview-grid" id="preview-grid"></div>
                <div style="display:flex; gap: 1rem; align-items: center;">
                    <button class="btn-sm" id="upload-btn" onclick="uploadAll()" disabled>upload all</button>
                    <button class="btn-ghost" onclick="clearQueue()">clear</button>
                    <span class="log" id="upload-log"></span>
                </div>
            </div>
        </div>

        <!-- Manage tab -->
        <div class="tab-panel" id="tab-manage">
            <div class="admin-section">
                <div class="cat-row">
                    <div class="category-tabs" id="manage-tabs"></div>
                    <button class="cat-new-btn" onclick="showCatForm('manage')">+ new</button>
                </div>
                <div class="cat-new-form" id="manage-new-form">
                    <input class="cat-new-input" id="manage-new-input" placeholder="category name" maxlength="40">
                    <button class="btn-sm" onclick="createCategory('manage')">create</button>
                    <button class="btn-ghost" onclick="hideCatForm('manage')">cancel</button>
                </div>
                <p class="text-muted" style="font-size:0.75rem; margin-bottom: 1rem;" id="manage-hint"></p>
                <div class="existing-grid" id="existing-grid"></div>
            </div>
        </div>

    </div>

    <footer>
        <span>&copy; 2026 shane roycroft</span>
        <a href="https://x.com/helloiamshane" target="_blank" rel="noopener" class="footer-x" aria-label="X / Twitter">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
    </footer>

    <script>
        const REPO = 'shaneroycroft/shaneroycroft';
        const BRANCH = 'main';
        const MANIFEST = 'photos.json';

        let uploadCat = 'japan';
        let manageCat = 'japan';
        let queue = []; // { file, objectUrl, name, caption }
        let manifest = null;

        // ─── Tabs ───────────────────────────────────────────
        function switchTab(name) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            document.querySelector(`.admin-tab[onclick="switchTab('${name}')"]`).classList.add('active');
            document.getElementById('tab-' + name).style.display = 'block';
            if (name === 'manage') renderManageGrid();
        }

        // ─── PAT ───────────────────────────────────────────
        function getPAT() { return localStorage.getItem('sr_gh_pat') || ''; }

        function togglePatForm() {
            const form = document.getElementById('pat-form');
            form.classList.toggle('visible');
        }

        function savePAT() {
            const val = document.getElementById('pat-input').value.trim();
            if (!val) return;
            localStorage.setItem('sr_gh_pat', val);
            document.getElementById('pat-input').value = '';
            document.getElementById('pat-form').classList.remove('visible');
            setPatStatus('verifying...', '');
            verifyPAT();
        }

        function clearPAT() {
            localStorage.removeItem('sr_gh_pat');
            document.getElementById('pat-input').value = '';
            document.getElementById('pat-form').classList.remove('visible');
            setPatStatus('no token saved', '');
            setAdminVisible(false);
        }

        function setPatStatus(msg, cls) {
            const el = document.getElementById('pat-strip-status');
            el.textContent = msg;
            el.className = 'pat-strip-status' + (cls ? ' ' + cls : '');
            // Update toggle label
            const btn = document.querySelector('.pat-edit-toggle');
            btn.textContent = cls === 'ok' ? 'change' : 'configure';
        }

        function setAdminVisible(visible) {
            document.getElementById('admin-tabs').style.display = visible ? 'flex' : 'none';
            document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
            if (visible) {
                const active = document.querySelector('.tab-panel.active') || document.getElementById('tab-upload');
                active.style.display = 'block';
            }
        }

        async function verifyPAT() {
            try {
                const res = await ghFetch(`https://api.github.com/repos/${REPO}`);
                if (res.ok) {
                    setPatStatus('connected — ' + REPO, 'ok');
                    await loadManifest();
                    const cats = Object.keys(manifest);
                    uploadCat = cats[0] || 'japan';
                    manageCat = cats[0] || 'japan';
                    renderAllCategoryTabs();
                    setAdminVisible(true);
                } else {
                    setPatStatus('token invalid or no repo access', 'err');
                    setAdminVisible(false);
                }
            } catch {
                setPatStatus('connection error', 'err');
                setAdminVisible(false);
            }
        }

        function ghFetch(url, opts = {}) {
            return fetch(url, {
                ...opts,
                headers: {
                    'Authorization': 'Bearer ' + getPAT(),
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    ...(opts.headers || {})
                }
            });
        }

        // ─── Manifest ──────────────────────────────────────
        async function loadManifest() {
            // When we have a PAT, fetch directly from GitHub API so we always
            // get the latest version, bypassing GitHub Pages cache delays.
            try {
                if (getPAT()) {
                    const res = await ghFetch(`https://api.github.com/repos/${REPO}/contents/${MANIFEST}`);
                    if (res.ok) {
                        const data = await res.json();
                        manifest = JSON.parse(atob(data.content.replace(/\n/g, '')));
                        return manifest;
                    }
                }
                // Fallback: fetch from the live site (no PAT or API error)
                const res = await fetch('photos.json?t=' + Date.now());
                manifest = await res.json();
            } catch {
                manifest = { 'japan': [], 'the desert': [], 'more': [] };
            }
            return manifest;
        }

        async function saveManifest() {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(manifest, null, 2) + '\n')));
            // Get current SHA
            const shaRes = await ghFetch(`https://api.github.com/repos/${REPO}/contents/${MANIFEST}`);
            let sha;
            if (shaRes.ok) {
                const data = await shaRes.json();
                sha = data.sha;
            }
            const body = { message: 'update photos.json', content, branch: BRANCH };
            if (sha) body.sha = sha;
            const res = await ghFetch(`https://api.github.com/repos/${REPO}/contents/${MANIFEST}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error('failed to save manifest');
        }

        // ─── Compression ───────────────────────────────────
        const MAX_DIM = 2400;   // longest edge in px
        const JPEG_Q  = 0.85;   // quality for JPEGs

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function compressImage(file) {
            return new Promise(resolve => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let w = img.naturalWidth, h = img.naturalHeight;
                    const isPng = file.type === 'image/png';

                    if (w <= MAX_DIM && h <= MAX_DIM && isPng) {
                        // PNG within limits — no recompression needed
                        resolve({ file, originalSize: file.size });
                        return;
                    }

                    if (w > MAX_DIM || h > MAX_DIM) {
                        const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                        w = Math.round(w * ratio);
                        h = Math.round(h * ratio);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);

                    const outType = isPng ? 'image/png' : 'image/jpeg';
                    canvas.toBlob(blob => {
                        // Only use compressed version if it's actually smaller
                        const outFile = blob.size < file.size
                            ? new File([blob], file.name, { type: outType })
                            : file;
                        resolve({ file: outFile, originalSize: file.size });
                    }, outType, isPng ? undefined : JPEG_Q);
                };
                img.src = url;
            });
        }

        // ─── Category tabs (dynamic) ────────────────────────
        function renderCategoryTabs(tabId, activeCat, onSelect) {
            const container = document.getElementById(tabId);
            container.innerHTML = '';
            Object.keys(manifest || {}).forEach(cat => {
                const span = document.createElement('span');
                span.textContent = cat;
                if (cat === activeCat) span.classList.add('active');
                span.onclick = () => onSelect(cat);
                container.appendChild(span);
            });
        }

        function showCatForm(context) {
            document.getElementById(context + '-new-form').classList.add('visible');
            document.getElementById(context + '-new-input').focus();
        }

        function hideCatForm(context) {
            document.getElementById(context + '-new-form').classList.remove('visible');
            document.getElementById(context + '-new-input').value = '';
        }

        async function createCategory(context) {
            const input = document.getElementById(context + '-new-input');
            const name = input.value.trim().toLowerCase();
            if (!name) return;
            if (manifest[name] !== undefined) {
                hideCatForm(context);
                if (context === 'upload') selectUploadCat(name);
                else selectManageCat(name);
                return;
            }
            manifest[name] = [];
            try {
                log('saving...', '');
                await saveManifest();
                hideCatForm(context);
                renderAllCategoryTabs();
                if (context === 'upload') selectUploadCat(name);
                else selectManageCat(name);
                log('category created.', 'ok');
            } catch (e) {
                delete manifest[name];
                log('failed to save: ' + e.message, 'err');
            }
        }

        // Enter key submits the new-category form
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('upload-new-form').classList.contains('visible')) createCategory('upload');
            else if (document.getElementById('manage-new-form').classList.contains('visible')) createCategory('manage');
        });

        function renderAllCategoryTabs() {
            renderCategoryTabs('upload-tabs', uploadCat, selectUploadCat);
            renderCategoryTabs('manage-tabs', manageCat, selectManageCat);
        }

        // ─── Upload ────────────────────────────────────────
        function selectUploadCat(cat) {
            uploadCat = cat;
            renderCategoryTabs('upload-tabs', cat, selectUploadCat);
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => addFiles(fileInput.files));

        async function addFiles(files) {
            const toProcess = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (toProcess.length === 0) return;
            log('compressing...', '');
            document.getElementById('upload-btn').disabled = true;

            for (const file of toProcess) {
                const { file: compressed, originalSize } = await compressImage(file);
                const objectUrl = URL.createObjectURL(compressed);
                const name = compressed.name.replace(/[^a-zA-Z0-9._-]/g, '_').toLowerCase();
                queue.push({ file: compressed, originalSize, objectUrl, name, caption: '', status: 'pending' });
            }

            log('', '');
            renderQueue();
            document.getElementById('upload-btn').disabled = queue.length === 0;
        }

        function renderQueue() {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';
            queue.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.id = 'preview-' + i;
                const sizeLabel = item.originalSize > item.file.size
                    ? `${formatSize(item.file.size)} <span style="color:var(--secondary)">was ${formatSize(item.originalSize)}</span>`
                    : formatSize(item.file.size);
                div.innerHTML = `
                    <img src="${item.objectUrl}" alt="">
                    <div class="preview-meta">
                        <span class="preview-size">${sizeLabel}</span>
                        <input
                            type="text"
                            class="preview-caption"
                            placeholder="caption (optional)"
                            value="${item.caption.replace(/"/g, '&quot;')}"
                            oninput="queue[${i}].caption = this.value"
                        >
                        <button class="preview-remove" onclick="removeFromQueue(${i})">remove</button>
                    </div>
                    <div class="progress-bar" id="bar-${i}"></div>
                    <div class="status-icon" id="icon-${i}" style="display:none"></div>
                `;
                grid.appendChild(div);
            });
        }

        function removeFromQueue(i) {
            URL.revokeObjectURL(queue[i].objectUrl);
            queue.splice(i, 1);
            renderQueue();
            document.getElementById('upload-btn').disabled = queue.length === 0;
        }

        function clearQueue() {
            queue.forEach(item => URL.revokeObjectURL(item.objectUrl));
            queue = [];
            renderQueue();
            document.getElementById('upload-btn').disabled = true;
            document.getElementById('upload-log').innerHTML = '';
        }

        async function uploadAll() {
            if (!getPAT()) { log('no token saved — enter your github PAT above.', 'err'); return; }
            if (queue.length === 0) return;

            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            log('loading manifest...', '');

            await loadManifest();
            if (!manifest[uploadCat]) manifest[uploadCat] = [];

            let success = 0;
            for (let i = 0; i < queue.length; i++) {
                const item = queue[i];
                const path = `images/${uploadCat === 'the desert' ? 'desert' : uploadCat}/${Date.now()}_${item.name}`;
                log(`uploading ${item.name}...`, '');
                setBar(i, 40);

                try {
                    const b64 = await toBase64(item.file);
                    // Check if file already exists (to get SHA for update)
                    let sha;
                    const checkRes = await ghFetch(`https://api.github.com/repos/${REPO}/contents/${path}`);
                    if (checkRes.ok) { const d = await checkRes.json(); sha = d.sha; }

                    const body = { message: `add photo: ${item.name}`, content: b64, branch: BRANCH };
                    if (sha) body.sha = sha;

                    const res = await ghFetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.message || 'upload failed');
                    }

                    setBar(i, 80);
                    const rawUrl = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
                    const entry = item.caption.trim()
                        ? { src: rawUrl, caption: item.caption.trim() }
                        : rawUrl;
                    manifest[uploadCat].push(entry);
                    setIcon(i, '✓');
                    setBar(i, 100);
                    success++;
                } catch (e) {
                    setIcon(i, '✕');
                    log(`failed: ${item.name} — ${e.message}`, 'err');
                }
            }

            if (success > 0) {
                log('saving manifest...', '');
                try {
                    await saveManifest();
                    log(`done. ${success} photo${success > 1 ? 's' : ''} uploaded.`, 'ok');
                    renderManageGrid();
                } catch (e) {
                    log('photos uploaded but manifest save failed: ' + e.message, 'err');
                }
            }

            btn.disabled = false;
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function setBar(i, pct) {
            const el = document.getElementById('bar-' + i);
            if (el) el.style.width = pct + '%';
        }

        function setIcon(i, icon) {
            const el = document.getElementById('icon-' + i);
            if (el) { el.textContent = icon; el.style.display = 'block'; }
        }

        function log(msg, cls) {
            const el = document.getElementById('upload-log');
            el.innerHTML = `<span class="${cls}">${msg}</span>`;
        }

        // ─── Manage Existing ───────────────────────────────
        function selectManageCat(cat) {
            manageCat = cat;
            renderCategoryTabs('manage-tabs', cat, selectManageCat);
            renderManageGrid();
        }

        function renderManageGrid() {
            const grid = document.getElementById('existing-grid');
            const hint = document.getElementById('manage-hint');
            grid.innerHTML = '';
            if (!manifest) { hint.textContent = 'load manifest first by uploading or refreshing.'; return; }
            const list = manifest[manageCat] || [];
            if (list.length === 0) { hint.textContent = 'no photos in this category yet.'; return; }
            const pinned = list.filter(e => (typeof e === 'object' && e.pinned)).length;
            hint.textContent = `${list.length} photo${list.length > 1 ? 's' : ''}${pinned ? ` — ${pinned} pinned` : ''} — hover to manage.`;
            list.forEach((entry, i) => {
                const src = typeof entry === 'string' ? entry : entry.src;
                const isPinned = typeof entry === 'object' && entry.pinned;
                const div = document.createElement('div');
                div.className = 'existing-item' + (isPinned ? ' pinned' : '');
                div.innerHTML = `
                    <img src="${src}" loading="lazy" alt="">
                    <div class="pin-dot"></div>
                    <div class="item-actions">
                        <button onclick="togglePin('${manageCat}', ${i})">${isPinned ? 'unpin' : 'pin'}</button>
                        <button class="btn-delete" onclick="deletePhoto('${manageCat}', ${i})">delete</button>
                    </div>`;
                grid.appendChild(div);
            });
        }

        async function togglePin(cat, index) {
            const entry = manifest[cat][index];
            const asObj = typeof entry === 'string' ? { src: entry } : { ...entry };
            if (asObj.pinned) {
                delete asObj.pinned;
            } else {
                asObj.pinned = true;
            }
            manifest[cat][index] = asObj;
            // Sort: pinned first, preserving relative order within each group
            manifest[cat].sort((a, b) => {
                const pa = typeof a === 'object' && a.pinned ? 1 : 0;
                const pb = typeof b === 'object' && b.pinned ? 1 : 0;
                return pb - pa;
            });
            try {
                await saveManifest();
                renderManageGrid();
            } catch (e) {
                alert('failed to save: ' + e.message);
            }
        }

        async function deletePhoto(cat, index) {
            if (!confirm('delete this photo from the manifest? (the file will remain in the repo)')) return;
            if (!manifest) { alert('manifest not loaded.'); return; }
            manifest[cat].splice(index, 1);
            try {
                await saveManifest();
                renderManageGrid();
            } catch (e) {
                alert('failed to save: ' + e.message);
                manifest[cat].splice(index, 0, manifest[cat][index]); // rollback
            }
        }



        // ─── Init ──────────────────────────────────────────
        window.addEventListener('load', () => {
            setAdminVisible(false);
            if (getPAT()) {
                setPatStatus('verifying...', '');
                verifyPAT();
            } else {
                document.getElementById('pat-form').classList.add('visible');
            }
        });
    </script>
</body>
</html>
